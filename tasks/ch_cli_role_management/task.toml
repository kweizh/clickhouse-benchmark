[environment]
image = "ch_cli_role_management_env"
build_context = "environment"

[environment.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
CLICKHOUSE_KEY_ID = "${CLICKHOUSE_KEY_ID}"
CLICKHOUSE_KEY_SECRET = "${CLICKHOUSE_KEY_SECRET}"
CLICKHOUSE_ORG_ID = "${CLICKHOUSE_ORG_ID}"

[execution]
timeout = 300

[verifier]
timeout = 60

[verifier.env]
POCHI_LOG = "debug"
POCHI_API_KEY = "${POCHI_API_KEY}"
CLICKHOUSE_KEY_ID = "${CLICKHOUSE_KEY_ID}"
CLICKHOUSE_KEY_SECRET = "${CLICKHOUSE_KEY_SECRET}"
CLICKHOUSE_ORG_ID = "${CLICKHOUSE_ORG_ID}"
